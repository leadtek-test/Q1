          type: string
          description: 建立容器任務 ID（UUID）。
          example: 6ccf39e1-6f47-4f9e-b04d-59e7e8f0b0ad
        status:
          type: string
          description: 任務狀態（英文）。
          enum:
            - accepted
            - creating
            - succeeded
            - failed
          example: creating
        container_id:
          type: integer
          minimum: 1
          description: 任務成功時對應建立出的容器 ID。
          example: 21
        error_message:
          type: string
          description: 任務失敗時的錯誤訊息。
          example: "failed to create container runtime -> image pull failed"

